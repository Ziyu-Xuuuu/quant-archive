name: Stock_Quant_environment
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.16
  - ta-lib  # 仅通过 Conda 安装
  - bzip2=1.0.8
  - ca-certificates
  - certifi
  - colorama
  - libffi
  - liblzma
  - sqlite  # 让 Conda 自动选择兼容版本
  - zlib
  - openssl
  - pip
  - tk

  - pip:
      - absl-py==2.1.0
      - aiohttp==3.10.11
      - beautifulsoup4==4.12.3
      - django==4.2.18
      - google-auth==2.37.0
      - google-auth-oauthlib==1.0.0
      - grpcio==1.69.0
      - h5py==3.11.0
      - keras==2.13.1
      - matplotlib==3.7.5
      - numpy==1.24.3
      - pandas==2.0.3
      - pillow==10.4.0
      - protobuf==4.25.5
      - requests==2.32.3
      - scikit-learn==1.3.2
      - scipy==1.10.1
      - sqlparse==0.5.3
      - tensorflow-macos==2.13.0  # Mac 版 TensorFlow
      - tensorflow-metal==1.0.0  # Apple GPU 加速
      - tqdm==4.67.1
      - transformers==4.46.3
